site_name: sdd-workflow
site_description: Stack-agnostic Spec-Driven Development workflow bundle
site_url: https://avatarsik6699.github.io/sdd-workflow/
repo_url: https://github.com/avatarsik6699/sdd-workflow
repo_name: avatarsik6699/sdd-workflow

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
          link: /sdd-workflow/
        - locale: ru
          name: Русский
          build: true
          link: /sdd-workflow/ru/
          nav_translations:
            Home: Главная
            Quickstart: Быстрый старт
            Skills Catalog: Каталог навыков
            Playbooks: Плейбуки
            Reference: Справочник
            Glossary: Глоссарий
            FAQ: Вопросы и ответы
            Architecture: Архитектура
            Compatibility: Совместимость
            Roadmap: Дорожная карта
            Contributing: Участие
  - search
  - git-revision-date-localized:
      type: date
  - include-markdown

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra_css:
  - stylesheets/extra.css

extra:
  alternate:
    - name: English
      link: /sdd-workflow/
      lang: en
    - name: Русский
      link: /sdd-workflow/ru/
      lang: ru

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Skills Catalog: skills.md
  - Playbooks:
      - Overview: playbooks/README.md
      - workflow-init: playbooks/workflow-init.md
      - spec-init: playbooks/spec-init.md
      - phase-init: playbooks/phase-init.md
      - phase-gate: playbooks/phase-gate.md
      - spec-sync: playbooks/spec-sync.md
      - context-update: playbooks/context-update.md
  - Reference:
      - Glossary: glossary.md
      - FAQ: faq.md
      - Architecture: architecture.md
      - Compatibility: compatibility.md
      - Roadmap: roadmap.md
      - Contributing: CONTRIBUTING.md
